<!DOCTYPE html>\n<html lang='pt-br'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Divisão de Contas</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .banner {\n            padding: 10px 14px;\n            border: 1px solid black;\n            text-align: center;\n        }\n        .label { font-size: 11px; }\n        .value { font-size: 15px; }\n        .row { display: flex; justify-content: space-around; }\n    </style>\n</head>\n<body>\n    <div class='banner'>\n        <div class='row'>\n            <div>\n                <span class='label'>Fatura:</span><br>\n                <span class='value' id='fatura'>R$ 0,00</span>\n            </div>\n            <div>\n                <span class='label'>Ajuste percentage:</span><br>\n                <span class='value' id='ajuste'>0%</span>\n            </div>\n            <div>\n                <span class='label'>Calculado:</span><br>\n                <span class='value' id='calculado'>R$ 0,00</span>\n            </div>\n        </div>\n    </div>\n</body>\n</html>
