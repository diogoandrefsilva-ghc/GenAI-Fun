<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisão Contas</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .hidden { display: none; }
        .order-item { margin: 5px 0; }
        .pdf-banner { padding: 10px 14px; border: 1px solid; display: flex; justify-content: space-around; font-size: 15px; }
        .pdf-banner span { font-size: 11px; }
    </style>
</head>
<body>
    <h1>Divisão de Contas</h1>
    <div id="friend-management">
        <h2>Gerenciar Amigos</h2>
        <input type="text" id="friend-name" placeholder="Nome do Amigo" />
        <button onclick="addFriend()">Adicionar Amigo</button>
        <ul id="friends-list"></ul>
    </div>

    <div id="order-management">
        <h2>Adicionar Pedido</h2>
        <div id="orders"></div>
        <input type="text" id="item-name" placeholder="Item" />
        <input type="number" id="item-price" placeholder="Preço" />
        <button onclick="addOrder()">Adicionar Pedido</button>
    </div>

    <button onclick="calculateBill()">Calcular Conta</button>
    <div id="bill-summary"></div>

    <button onclick="exportPDF()">Exportar PDF</button>
    <button onclick="backupData()">Backup</button>
    <button onclick="restoreData()">Restaurar</button>

    <script>
        let friends = [];
        let orders = [];

        function addFriend() {
            const name = document.getElementById('friend-name').value;
            friends.push(name);
            document.getElementById('friend-name').value = '';
            updateFriendsList();
        }

        function updateFriendsList() {
            const list = document.getElementById('friends-list');
            list.innerHTML = '';
            friends.forEach(friend => {
                const li = document.createElement('li');
                li.innerText = friend;
                list.appendChild(li);
            });
        }

        function addOrder() {
            const name = document.getElementById('item-name').value;
            const price = parseFloat(document.getElementById('item-price').value);
            orders.push({ name, price });
            document.getElementById('item-name').value = '';
            document.getElementById('item-price').value = '';
            updateOrdersList();
        }

        function updateOrdersList() {
            const ordersDiv = document.getElementById('orders');
            ordersDiv.innerHTML = '';
            orders.forEach(order => {
                const div = document.createElement('div');
                div.classList.add('order-item');
                div.innerText = `${order.name} - R$ ${order.price.toFixed(2)}`;
                ordersDiv.appendChild(div);
            });
        }

        function calculateBill() {
            const total = orders.reduce((sum, order) => sum + order.price, 0);
            const share = total / friends.length;
            document.getElementById('bill-summary').innerText = `Total: R$ ${total.toFixed(2)}, Cada um paga: R$ ${share.toFixed(2)}`;
        }

        function exportPDF() {
            const pdfContent = document.createElement('div');
            pdfContent.innerHTML = `<div class='pdf-banner'>\n                <span>Fatura</span>\n                <span>Ajuste %</span>\n                <span>Calculado</span>\n            </div>\n            <div>R$ ${orders.reduce((sum, order) => sum + order.price, 0).toFixed(2)}</div>`;
            // PDF export logic here... (using a library like jsPDF)
        }

        function backupData() {
            localStorage.setItem('friends', JSON.stringify(friends));
            localStorage.setItem('orders', JSON.stringify(orders));
            alert('Backup realizado com sucesso!');
        }

        function restoreData() {
            friends = JSON.parse(localStorage.getItem('friends')) || [];
            orders = JSON.parse(localStorage.getItem('orders')) || [];
            updateFriendsList();
            updateOrdersList();
            alert('Restauração realizada com sucesso!');
        }
    </script>
</body>
</html>
